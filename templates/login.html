<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — TrackED</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#F7F8FA;min-height:100vh;
         display:grid;place-items:center;-webkit-font-smoothing:antialiased;}
    .box{width:100%;max-width:360px;padding:20px;}
    .brand{text-align:center;margin-bottom:28px;}
    .logo{width:40px;height:40px;background:#2563EB;border-radius:9px;
          display:grid;place-items:center;color:#fff;font-weight:800;
          font-size:1rem;margin:0 auto 10px;}
    h1{font-size:1.1rem;font-weight:700;color:#111827;}
    .sub{font-size:0.82rem;color:#9CA3AF;margin-top:3px;}
    .card{background:#fff;border:1px solid #E4E7EC;border-radius:10px;padding:24px;}
    label{display:block;font-size:0.79rem;font-weight:600;color:#6B7280;margin-bottom:4px;}
    input{width:100%;padding:8px 11px;border:1px solid #E4E7EC;border-radius:7px;
          font-size:0.875rem;font-family:'Inter',sans-serif;color:#111827;
          background:#F7F8FA;outline:none;margin-bottom:12px;
          transition:border .12s,box-shadow .12s;}
    input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff;}
    .btn{width:100%;padding:9px;border:none;border-radius:7px;background:#2563EB;
         color:#fff;font-size:0.875rem;font-weight:600;font-family:'Inter',sans-serif;
         cursor:pointer;transition:background .12s;}
    .btn:hover{background:#1D4ED8;}
    .err{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;
         padding:8px 11px;border-radius:7px;font-size:0.8rem;
         font-weight:500;margin-bottom:12px;}
    .fp{display:block;text-align:center;margin-top:14px;font-size:0.78rem;
        color:#9CA3AF;text-decoration:none;}
    .fp:hover{color:#6B7280;}
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <div class="logo">T</div>
      <h1>TrackED</h1>
      <div class="sub">Training Attendance Platform</div>
    </div>
    <div class="card">
      {% for cat, msg in get_flashed_messages(with_categories=True) %}
        <div class="err">{{ msg }}</div>
      {% endfor %}
      <form method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@company.com" autofocus required/>
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
        <button class="btn" type="submit">Sign In</button>
      </form>
      <a href="{{ url_for('forgot_password') }}" class="fp">Forgot password?</a>
    </div>
  </div>
</body>
</html>
