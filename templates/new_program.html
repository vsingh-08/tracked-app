{% extends "base.html" %}
{% block title %}New Program — TrackED{% endblock %}
{% block content %}
<div style="max-width:600px;">
  <a href="{{ url_for('dashboard') }}" style="font-size:0.8rem;color:var(--muted);
     text-decoration:none;display:inline-block;margin-bottom:14px;">← Back</a>
  <h1 style="font-size:1.1rem;font-weight:700;margin-bottom:20px;">New Program</h1>

  <form method="POST">
    <div class="card" style="margin-bottom:12px;">
      <div class="card-b">
        <div class="fl-row">
          <div class="fg">
            <label>Program Name *</label>
            <input type="text" name="name" placeholder="e.g. AWS Architecture Training" required/>
          </div>
          <div class="fg">
            <label>Client / Company *</label>
            <input type="text" name="client" placeholder="e.g. XYZ Corp" required/>
          </div>
        </div>
        <div class="fl-row">
          <div class="fg">
            <label>Attendance Threshold (%)</label>
            <input type="number" name="threshold" value="50" min="0" max="100"/>
            <div class="hint">Min % of session time to count as Present</div>
          </div>
          <div class="fg">
            <label>Name format in Teams</label>
            <select name="name_format">
              <option value="auto">Auto-detect</option>
              <option value="first_last">First Last</option>
              <option value="last_first">Last, First</option>
              <option value="last_first_co">Last, First (Company)</option>
              <option value="first_last_co">First Last (Company)</option>
              <option value="as_is">As-is</option>
            </select>
          </div>
        </div>
        <div class="fl-row">
          <div class="fg">
            <label>Organizer / Excluded Names</label>
            <textarea name="exclude_names" placeholder="One per line&#10;e.g. Organizer1"></textarea>
            <div class="hint">Removed from report entirely</div>
          </div>
          <div class="fg">
            <label>Mentor / Trainer Names</label>
            <textarea name="mentor_names" placeholder="One per line&#10;e.g. Alice Mentor"></textarea>
            <div class="hint">Excluded from participant rows</div>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <a href="{{ url_for('dashboard') }}" class="btn btn-s">Cancel</a>
      <button type="submit" class="btn btn-p">Create Program →</button>
    </div>
  </form>
</div>
{% endblock %}
